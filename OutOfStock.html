<!DOCTYPE html>
<html>
<body>
 
 <p id="demo"></p>

<script>
var xhttp = new XMLHttpRequest(); 
xhttp.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
        OutOfStock(this);
    }
};
xhttp.open("GET", "libreria.xml", true); //apertura file xml
xhttp.send();

function OutOfStock(xml) {
    var xmlDoc = xml.responseXML; 
    var libro = xmlDoc.getElementsByTagName('book');

    libro[0].setAttribute("price","Fuori Stampa");
    libro[0].price.setAttribute("currency","N/A");
    document.getElementById("demo").innerHTML =
    libro[0].getAttribute("price"); //tipo per stampare a schermo
}
</script>
 
</body>
</html>
